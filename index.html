<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Global Timers - World Clocks, Stopwatch and Countdown Timer">
<meta name="theme-color" content="#1f1f1f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Global Timers">
<title>Global Timers</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
<canvas id="particles-canvas" aria-hidden="true"></canvas>

<div class="app-wrapper">

  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">Global Timers</h1>
      <p class="site-subtitle">World Clocks &bull; Stopwatch &bull; Timer</p>
    </div>
  </header>

  <main class="main-content">

    <section class="section main-clock-section" aria-label="Main Clock">
      <div class="main-clock-display">
        <div class="clock-time" id="main-time" aria-live="polite" aria-atomic="true">00:00:00</div>
        <div class="clock-date" id="main-date"></div>
        <div class="clock-meta">
          <span class="clock-meta-item" id="main-dayofweek"></span>
          <span class="clock-meta-separator">&bull;</span>
          <span class="clock-meta-item" id="main-dayofyear"></span>
        </div>
      </div>
    </section>

    <section class="section world-clocks-section" aria-label="World Clocks">
      <div class="section-header">
        <h2 class="section-title">World Clocks</h2>
      </div>
      <div class="world-clocks-grid" id="world-clocks-grid" aria-live="polite" aria-atomic="true"></div>
    </section>

    <section class="section stopwatch-section" aria-label="Stopwatch">
      <div class="section-header">
        <h2 class="section-title">Stopwatch</h2>
      </div>
      <div class="tool-card">
        <div class="stopwatch-display" id="stopwatch-display" aria-live="polite" aria-atomic="true">00:00:00.000</div>
        <div class="controls">
          <button class="btn btn-primary" id="stopwatch-start" aria-label="Start stopwatch">Start</button>
          <button class="btn btn-secondary" id="stopwatch-pause" aria-label="Pause stopwatch" disabled>Pause</button>
          <button class="btn btn-danger" id="stopwatch-reset" aria-label="Reset stopwatch">Reset</button>
        </div>
      </div>
    </section>

    <section class="section timer-section" aria-label="Countdown Timer">
      <div class="section-header">
        <h2 class="section-title">Countdown Timer</h2>
      </div>
      <div class="tool-card">
        <div class="timer-inputs" id="timer-inputs">
          <div class="input-group">
            <label for="timer-minutes" class="input-label">Minutes</label>
            <input type="number" id="timer-minutes" class="time-input" min="0" max="99" value="5" aria-label="Timer minutes">
          </div>
          <div class="input-separator">:</div>
          <div class="input-group">
            <label for="timer-seconds" class="input-label">Seconds</label>
            <input type="number" id="timer-seconds" class="time-input" min="0" max="59" value="0" aria-label="Timer seconds">
          </div>
        </div>
        <div class="timer-display" id="timer-display" aria-live="polite" aria-atomic="true" style="display:none;">00:00</div>
        <div class="timer-complete-msg" id="timer-complete-msg" aria-live="assertive" style="display:none;">Time is up</div>
        <div class="controls">
          <button class="btn btn-primary" id="timer-start" aria-label="Start timer">Start</button>
          <button class="btn btn-secondary" id="timer-pause" aria-label="Pause timer" disabled>Pause</button>
          <button class="btn btn-danger" id="timer-reset" aria-label="Reset timer">Reset</button>
        </div>
      </div>
    </section>

    <section class="section settings-section" aria-label="Settings">
      <div class="section-header">
        <h2 class="section-title">Settings</h2>
      </div>
      <div class="settings-grid">

        <div class="settings-card">
          <h3 class="settings-card-title">Particles</h3>
          <div class="setting-row">
            <label class="setting-label" for="setting-particles-enabled">Enable particles</label>
            <label class="toggle" aria-label="Enable particles">
              <input type="checkbox" id="setting-particles-enabled" role="switch">
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </label>
          </div>
          <div class="setting-row">
            <label class="setting-label" for="setting-particle-count">Particle count</label>
            <div class="range-group">
              <input type="range" id="setting-particle-count" class="range-input" min="10" max="150" step="5" value="60">
              <span class="range-value" id="particle-count-value">60</span>
            </div>
          </div>
        </div>

        <div class="settings-card">
          <h3 class="settings-card-title">Stopwatch</h3>
          <div class="setting-row">
            <label class="setting-label" for="setting-show-ms">Show milliseconds</label>
            <label class="toggle" aria-label="Show milliseconds">
              <input type="checkbox" id="setting-show-ms" role="switch">
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </label>
          </div>
        </div>

        <div class="settings-card">
          <h3 class="settings-card-title">World Clocks</h3>
          <div id="clock-toggles"></div>
        </div>

      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p class="footer-text">Made with love by Aki</p>
  </footer>

</div>

<audio id="alarm-audio" src="assets/alarm.mp3" preload="auto"></audio>

<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/particles.js"></script>
<script src="js/clock.js"></script>
<script src="js/stopwatch.js"></script>
<script src="js/timer.js"></script>
<script src="js/app.js"></script>
</body>
</html>
